<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="paintTrail1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff7b72"/>
      <stop offset="20%" stop-color="#ffa657"/>
      <stop offset="40%" stop-color="#e3b341"/>
      <stop offset="60%" stop-color="#7ee787"/>
      <stop offset="80%" stop-color="#79c0ff"/>
      <stop offset="100%" stop-color="#d2a8ff"/>
    </linearGradient>
    <linearGradient id="handleGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3d2a10"/>
      <stop offset="100%" stop-color="#2d1f0e"/>
    </linearGradient>
    <clipPath id="topHalf">
      <path d="M16 16 L496 16 L496 270 Q350 250 200 268 Q120 276 16 290 Z"/>
    </clipPath>
    <clipPath id="bottomHalf">
      <path d="M16 290 Q120 276 200 268 Q350 250 496 270 L496 496 L16 496 Z"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="72" fill="#1a1f35"/>
  <rect x="20" y="20" width="472" height="472" rx="70" fill="none" stroke="#2a3050" stroke-width="1"/>

  <!-- Grey code lines (top half, clipped above the brush stroke) -->
  <g clip-path="url(#topHalf)" opacity="0.28">
    <rect x="80" y="100" width="90" height="10" rx="5" fill="#8b949e"/>
    <rect x="180" y="100" width="50" height="10" rx="5" fill="#8b949e"/>
    <rect x="100" y="126" width="140" height="10" rx="5" fill="#8b949e"/>
    <rect x="250" y="126" width="70" height="10" rx="5" fill="#8b949e"/>
    <rect x="100" y="152" width="60" height="10" rx="5" fill="#8b949e"/>
    <rect x="170" y="152" width="110" height="10" rx="5" fill="#8b949e"/>
    <rect x="120" y="178" width="80" height="10" rx="5" fill="#8b949e"/>
    <rect x="210" y="178" width="40" height="10" rx="5" fill="#8b949e"/>
    <rect x="100" y="204" width="170" height="10" rx="5" fill="#8b949e"/>
    <rect x="80" y="230" width="60" height="10" rx="5" fill="#8b949e"/>
    <rect x="150" y="230" width="100" height="10" rx="5" fill="#8b949e"/>
    <rect x="100" y="256" width="120" height="10" rx="5" fill="#8b949e"/>
  </g>

  <!-- Colored code lines (bottom half, clipped below the brush stroke) -->
  <g clip-path="url(#bottomHalf)">
    <rect x="80" y="100" width="90" height="10" rx="5" fill="#d2a8ff"/>
    <rect x="180" y="100" width="50" height="10" rx="5" fill="#79c0ff"/>
    <rect x="100" y="126" width="140" height="10" rx="5" fill="#ff7b72"/>
    <rect x="250" y="126" width="70" height="10" rx="5" fill="#7ee787"/>
    <rect x="100" y="152" width="60" height="10" rx="5" fill="#ffa657"/>
    <rect x="170" y="152" width="110" height="10" rx="5" fill="#79c0ff"/>
    <rect x="120" y="178" width="80" height="10" rx="5" fill="#7ee787"/>
    <rect x="210" y="178" width="40" height="10" rx="5" fill="#e3b341"/>
    <rect x="100" y="204" width="100" height="10" rx="5" fill="#d2a8ff"/>
    <rect x="210" y="204" width="60" height="10" rx="5" fill="#ff7b72"/>
    <rect x="80" y="230" width="60" height="10" rx="5" fill="#79c0ff"/>
    <rect x="150" y="230" width="100" height="10" rx="5" fill="#ffa657"/>
    <rect x="100" y="256" width="70" height="10" rx="5" fill="#7ee787"/>
    <rect x="180" y="256" width="60" height="10" rx="5" fill="#d2a8ff"/>

    <rect x="80" y="290" width="70" height="10" rx="5" fill="#ff7b72"/>
    <rect x="160" y="290" width="120" height="10" rx="5" fill="#7ee787"/>
    <rect x="290" y="290" width="50" height="10" rx="5" fill="#79c0ff"/>
    <rect x="100" y="316" width="50" height="10" rx="5" fill="#ffa657"/>
    <rect x="160" y="316" width="90" height="10" rx="5" fill="#d2a8ff"/>
    <rect x="260" y="316" width="80" height="10" rx="5" fill="#e3b341"/>
    <rect x="100" y="342" width="110" height="10" rx="5" fill="#79c0ff"/>
    <rect x="220" y="342" width="60" height="10" rx="5" fill="#ff7b72"/>
    <rect x="120" y="368" width="80" height="10" rx="5" fill="#7ee787"/>
    <rect x="210" y="368" width="50" height="10" rx="5" fill="#ffa657"/>
    <rect x="80" y="394" width="60" height="10" rx="5" fill="#d2a8ff"/>
    <rect x="150" y="394" width="90" height="10" rx="5" fill="#79c0ff"/>
  </g>

  <!-- Dividing brush stroke (sharp, prominent) -->
  <path d="M30 288 Q130 272 240 266 Q360 258 490 268"
        stroke="url(#paintTrail1)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M30 288 Q130 272 240 266 Q360 258 490 268"
        stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.15"/>

  <!-- Angle brackets -->
  <path d="M370 130 L348 160 L370 190" stroke="#79c0ff" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  <path d="M410 130 L432 160 L410 190" stroke="#79c0ff" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>

  <!-- Japanese brush (fude) -->
  <g transform="translate(340, 370) rotate(60)">
    <!-- Brush tip (larger, brighter) -->
    <path d="M0 0 Q-16 30 -9 80 Q0 95 9 80 Q16 30 0 0 Z" fill="#f0e8dc"/>
    <path d="M-6 18 Q0 68 6 18" fill="url(#paintTrail1)" opacity="0.7"/>
    <!-- Ferrule -->
    <rect x="-12" y="-20" width="24" height="22" rx="4" fill="#d4af5a"/>
    <rect x="-12" y="-20" width="24" height="5" rx="2" fill="#e8cc78" opacity="0.6"/>
    <!-- Handle (lighter brown, thicker) -->
    <rect x="-9" y="-145" width="18" height="128" rx="6" fill="#5a3d1a"/>
    <rect x="-9" y="-145" width="18" height="26" rx="6" fill="#d4af5a" opacity="0.25"/>
    <!-- Handle ring accents -->
    <rect x="-10" y="-65" width="20" height="5" rx="2.5" fill="#d4af5a" opacity="0.4"/>
    <rect x="-10" y="-45" width="20" height="5" rx="2.5" fill="#d4af5a" opacity="0.3"/>
  </g>
</svg>
