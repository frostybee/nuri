<svg xmlns="http://www.w3.org/2000/svg" width="385px" height="217px" viewBox="0 0 385 217" font-family="Consolas, Monaco, Lucida Console, Liberation Mono, DejaVu Sans Mono, monospace" font-size="14px"><rect width="100%" height="100%" fill="#24292e" rx="8"/><g fill="#e1e4e8"><text x="16" y="30.0" xml:space="preserve"><tspan fill="#f97583">package</tspan>&#160;<tspan fill="#b392f0">main</tspan></text><text x="16" y="46.8" xml:space="preserve"></text><text x="16" y="63.6" xml:space="preserve"><tspan fill="#f97583">import</tspan>&#160;<tspan fill="#9ecbff">&quot;</tspan><tspan fill="#b392f0">fmt</tspan><tspan fill="#9ecbff">&quot;</tspan></text><text x="16" y="80.4" xml:space="preserve"></text><text x="16" y="97.2" xml:space="preserve"><tspan fill="#f97583">func</tspan>&#160;<tspan fill="#b392f0">Greet</tspan>(<tspan fill="#ffab70">name</tspan>&#160;<tspan fill="#f97583">string</tspan>)&#160;<tspan fill="#f97583">string</tspan>&#160;{</text><text x="16" y="114.0" xml:space="preserve">&#160;&#160;&#160;&#160;<tspan fill="#f97583">return</tspan>&#160;fmt.<tspan fill="#b392f0">Sprintf</tspan>(<tspan fill="#9ecbff">&quot;</tspan><tspan fill="#9ecbff">Hello,&#160;</tspan><tspan fill="#79b8ff">%s</tspan><tspan fill="#9ecbff">!</tspan><tspan fill="#9ecbff">&quot;</tspan>,&#160;name)</text><text x="16" y="130.8" xml:space="preserve">}</text><text x="16" y="147.6" xml:space="preserve"></text><text x="16" y="164.4" xml:space="preserve"><tspan fill="#f97583">func</tspan>&#160;<tspan fill="#b392f0">main</tspan>()&#160;{</text><text x="16" y="181.2" xml:space="preserve">&#160;&#160;&#160;&#160;fmt.<tspan fill="#b392f0">Println</tspan>(<tspan fill="#b392f0">Greet</tspan>(<tspan fill="#9ecbff">&quot;</tspan><tspan fill="#9ecbff">world</tspan><tspan fill="#9ecbff">&quot;</tspan>))</text><text x="16" y="198.0" xml:space="preserve">}</text></g></svg>