name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      # internal/fidelity is excluded here: known-incomplete grammars keep it
      # red by design until they reach 100%; it has dedicated workflows
      # (full-gate.yml, nightly.yml).
      - run: go test -count=1 $(go list ./... | grep -v internal/fidelity)

  race:
    name: Race Detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      # Race detection needs CGO (unavailable on the no-toolchain dev
      # machines this library targets) — this job is the project's race
      # coverage. Submodules give the root-package and theme tests real
      # grammars/themes instead of skipping.
      - name: Tests under race detector
        run: go test -race -count=1 $(go list ./... | grep -v internal/fidelity)
      # Drives CodeToTokens/CodeToHTML/CodeToANSI through a 4-instance pool
      # with RunParallel — the strongest concurrent exercise of the
      # per-instance scanner/FFI caches.
      - name: Concurrent benchmark under race detector
        run: go test -race -run '^$' -bench BenchmarkConcurrent -benchtime=1x ./cmd/bench/

  provenance-check:
    name: Provenance Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Verify provenance lockfile
        run: go run ./tools/devtool verify

  fixture-freshness:
    name: Fixture Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Verify provenance lockfile
        run: go run ./tools/devtool verify
      - name: Generate fixtures
        run: go run ./tools/devtool generate
      - name: Assert fixtures unchanged
        run: git diff --exit-code internal/fidelity/testdata/golden/

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Run benchmarks
        run: go test -bench=. -benchmem -count=5 ./... > bench.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: benchmarks
          path: bench.txt
