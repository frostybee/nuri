name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go test ./... -count=1

  provenance-check:
    name: Provenance Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Verify provenance lockfile
        run: go run ./tools/devtool verify

  fixture-freshness:
    name: Fixture Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Verify provenance lockfile
        run: go run ./tools/devtool verify
      - name: Generate fixtures
        run: go run ./tools/devtool generate
      - name: Assert fixtures unchanged
        run: git diff --exit-code internal/fidelity/testdata/golden/

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Run benchmarks
        run: go test -bench=. -benchmem -count=5 ./... > bench.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: benchmarks
          path: bench.txt
